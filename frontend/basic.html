<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talking Avatar Service Demo</title>
    <link href="./css/styles.css" rel="stylesheet">
  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script src="./js/basic.js"></script>
  <script src="./js/narration_loader.js"></script>
  <script src="./js/ask_ai_voice.js"></script>
  <script src="./js/voice_slide_navigation.js"></script>
      <script>
        function updateHealthDot(active) {
          var dot = document.getElementById('healthDot');
          if (dot) {
            dot.style.background = active ? '#43a047' : '#d32f2f';
          }
        }
        function pollHealth() {
          fetch('http://localhost:5050/api/health')
            .then(r => r.ok ? updateHealthDot(true) : updateHealthDot(false))
            .catch(() => updateHealthDot(false));
        }
        setInterval(pollHealth, 3000);
        pollHealth();
      </script>
      <link rel="icon" type="image/png" href="/favicon.ico">
</head>
<body>
    <div style="position: absolute; left: 16px; top: 4px; z-index: 1000;">
        <img src="image/logo.png" alt="Microsoft Logo" style="height: 64px; width: auto;" />
    </div>
<div style="text-align:center; margin-top:10px; margin-bottom:4px;">
  <span style="font-size:2.3em; font-weight:700; background: linear-gradient(90deg,#1976d2,#00b8d4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; display:inline-block; letter-spacing:1px;">Askly</span>
  <div style="font-size:1.1em; color:#555; margin-top:8px;">Smarter Storytelling with AI</div>
  <span id="healthDot" style="position:absolute; top:26px; right:8px; width:16px; height:16px; border-radius:50%; background:#d32f2f; border:2px solid #fff; box-shadow:0 0 4px rgba(0,0,0,0.2); display:inline-block;" title="Backend status"></span>
</div>

<!-- Hide Azure Speech Resource and Avatar Configuration sections -->
<div id="configuration" style="display:none;">
  <h2 style="background-color: white; width: 300px;">Azure Speech Resource</h2>
  <label style="font-size: medium;" for="region">Region:</label>
  <select id="region" style="font-size: medium;">
    <option value="westus2">West US 2</option>
    <option value="westeurope">West Europe</option>
    <option value="southeastasia">Southeast Asia</option>
  </select>
  <label style="font-size: medium;" for="APIKey">API Key:</label>
  <input id="APIKey" type="password" size="32" style="font-size: medium;" />
  <div style="background-color: white; width: 300px;">
    <input type="checkbox" id="enablePrivateEndpoint" onchange = "window.updatePrivateEndpoint()">Enable Private Endpoint</input><br />
  </div>
  <div id = "showPrivateEndpointCheckBox" hidden="hidden">
    <label style="font-size: medium;" for="privateEndpoint">Private Endpoint:</label>
    <input id="privateEndpoint" type="text" size="64" style="font-size: medium;" placeholder="https://{your custom name}.cognitiveservices.azure.com/"></input><br />
  </div><br />

  <h2 style="background-color: white; width: 300px;">TTS Configuration</h2>
  <label style="font-size: medium;" for="ttsVoice">TTS Voice:</label>
  <input id="ttsVoice" type="text" size="32" style="font-size: medium;" value="en-US-AvaMultilingualNeural"></input><br />
  <label style="font-size: medium;" for="customVoiceEndpointId">Custom Voice Deployment ID (Endpoint ID):</label>
  <input id="customVoiceEndpointId" type="text" size="32" style="font-size: medium;" value=""></input><br />
  <label style="font-size: medium;" for="personalVoiceSpeakerProfileID">Personal Voice Speaker Profile ID:</label>
  <input id="personalVoiceSpeakerProfileID" type="text" size="32" style="font-size: medium;" value=""></input><br />
  <br />

  <h2 style="background-color: white; width: 300px;">Avatar Configuration</h2>
  <label style="font-size: medium;" for="talkingAvatarCharacter">Avatar Character:</label>
  <input id="talkingAvatarCharacter" type="text" size="16" style="font-size: medium;" value="lisa"></input><br />
  <label style="font-size: medium;" for="talkingAvatarStyle">Avatar Style:</label>
  <input id="talkingAvatarStyle" type="text" size="16" style="font-size: medium;" value="casual-sitting"></input><br />
  <label style="font-size: medium;" for="backgroundColor">Background Color:</label>
  <input id="backgroundColor" type="text" size="16" style="font-size: medium;" value="#FFFFFFFF"></input><br />
  <div style="background-color: white; width: 200px;">
    <input type="checkbox" id="customizedAvatar">Custom Avatar</input><br />
    <input type="checkbox" id="transparentBackground" onchange="window.updataTransparentBackground()">Transparent
    Background</input><br />
    <input type="checkbox" id="videoCrop">Video Crop</input><br />
  </div>
  <br />
</div>

<div style="margin-top: 16px;">
  <button id="startSession" class="ppt-btn" onclick="window.startSession()">Start Session</button>
  <button id="stopSpeaking" class="ppt-btn" onclick="window.stopSpeaking()" disabled="disabled">Stop Speaking</button>
  <button id="replaySpeaking" class="ppt-btn" onclick="window.replaySpeaking()" disabled="disabled">Replay</button>
  <button id="stopSession" class="ppt-btn" onclick="window.stopSession()" disabled="disabled">Stop Session</button>
  <button id="askAI" class="session-btn" onclick="window.askAI()" disabled="disabled">Ask AI</button>
  <div style="float:right; margin-right:24px;">
    <div class="voice-toggle-container">
      <span class="voice-toggle-label-top">Voice</span>
      <label class="voice-toggle-switch">
        <input type="checkbox" id="voiceToggleCheckbox" checked onclick="window.toggleVoiceInput()">
        <span class="voice-toggle-slider"></span>
      </label>
    </div>
    <button id="unloadContentBtn" class="ppt-btn" onclick="window.unloadContent()">Unload Content</button>
    <button id="prevSlideBtn" class="ppt-btn nav-btn">Previous Slide</button>
    <button id="nextSlideBtn" class="ppt-btn nav-btn">Next Slide</button>
  </div>
</div>
<br style="clear:both;"/>

<div style="display: flex; flex-direction: column; align-items: flex-start; min-height: 75vh; margin: 12px 1vw;">
  <img id="slideImage" style="max-width:75vw; max-height:80vh; display:block; margin-left:0; box-shadow:0 4px 24px rgba(0,0,0,0.15); border-radius:16px; background:#fff;" />
</div>

<!-- Avatar Vertical Window -->
<style>
  #avatarPiP {
    width: 320px !important;
  height: 900px !important;
    position: fixed;
    bottom: 32px;
    right: 16px;
    z-index: 1000;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 2px solid #e0e0e0;
  }
  #avatarPiP #remoteVideo video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    border-radius: 28px;
    background: #000;
    transform: none !important;
  }
  #avatarPiP #remoteVideo {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  #avatarPlaceholder {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    left: 0;
    top: 0;
    z-index: 1;
    border-radius: 28px;
  }
</style>
<div id="avatarPiP">
  <div id="remoteVideo">
    <img id="avatarPlaceholder" src="image/azure.jpg" alt="Azure Placeholder" />
  </div>
  <canvas id="canvas" width="1920" height="1080" style="background-color: transparent; position: absolute; left: 0; top: 0;" hidden="hidden"></canvas>
  <canvas id="tmpCanvas" width="1920" height="1080" hidden="hidden"></canvas>
  <div id="overlayArea" style="position: absolute; left: 0; top: 0; width: 100%;" hidden="hidden">
    <p id="overlayText" style="font-size: large; color: #222; margin: 0.5em;">Live Video</p>
  </div>
</div>
<br/>


</body>
</html>
